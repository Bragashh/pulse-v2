# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name pulse-hq.dev www.pulse-hq.dev staging.pulse-hq.dev;
    return 301 https://$host$request_uri;
}

# Production hostname (will be the canonical site once prod EC2 takes over)
server {
    listen 443 ssl;
    server_name pulse-hq.dev www.pulse-hq.dev;

    ssl_certificate /etc/letsencrypt/live/pulse-hq.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulse-hq.dev/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://pulse-backend:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Staging hostname
server {
    listen 443 ssl;
    server_name staging.pulse-hq.dev;

    ssl_certificate /etc/letsencrypt/live/staging.pulse-hq.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.pulse-hq.dev/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://pulse-backend:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}