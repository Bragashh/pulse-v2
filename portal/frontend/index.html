<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pulse — DevOps Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    header { padding: 24px 40px; border-bottom: 1px solid #1e2330; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.05em; color: #7dd3fc; }
    header span { font-size: 0.85rem; color: #64748b; }
    .container { padding: 40px; display: grid; gap: 32px; }
    .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 16px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-header .section-title { margin-bottom: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .card { background: #1a1f2e; border: 1px solid #1e2330; border-radius: 12px; padding: 24px; }
    .card-label { font-size: 0.75rem; color: #64748b; margin-bottom: 8px; }
    .card-value { font-size: 2rem; font-weight: 700; color: #f1f5f9; }
    .card-sub { font-size: 0.78rem; color: #64748b; margin-top: 4px; }
    .score-card { background: #1a1f2e; border: 1px solid #1e2330; border-radius: 12px; padding: 32px; display: flex; align-items: center; gap: 32px; }
    .score-number { font-size: 4rem; font-weight: 800; }
    .score-healthy { color: #4ade80; }
    .score-degraded { color: #facc15; }
    .score-critical { color: #f87171; }
    .score-label { font-size: 1rem; color: #94a3b8; }
    .score-status { font-size: 1.2rem; font-weight: 600; margin-top: 4px; }
    .uptime-grid { display: grid; gap: 12px; }
    .uptime-row { background: #1a1f2e; border: 1px solid #1e2330; border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .uptime-row-info { flex: 1; min-width: 0; }
    .uptime-row-actions { display: flex; align-items: center; gap: 12px; }
    .uptime-name { font-size: 0.9rem; font-weight: 600; }
    .uptime-latency { font-size: 0.78rem; color: #64748b; margin-top: 2px; word-break: break-all; }
    .badge { font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 99px; }
    .badge.up { background: #052e16; color: #4ade80; }
    .badge.down { background: #2d0a0a; color: #f87171; }
    .badge.degraded { background: #1e1a05; color: #facc15; }
    .dora-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .loading { color: #475569; font-size: 0.85rem; }
    .refresh { font-size: 0.75rem; color: #475569; }

    /* Buttons */
    .btn {
      background: #1a1f2e; color: #e2e8f0; border: 1px solid #1e2330;
      padding: 8px 14px; border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; font-weight: 500; font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #252b3d; border-color: #334155; }
    .btn-primary { background: #0369a1; border-color: #0369a1; color: #fff; }
    .btn-primary:hover { background: #0284c7; border-color: #0284c7; }
    .btn-danger { background: transparent; border-color: transparent; color: #64748b; padding: 4px 8px; }
    .btn-danger:hover { background: #2d0a0a; color: #f87171; border-color: #2d0a0a; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
      display: none; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(2px);
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: #1a1f2e; border: 1px solid #1e2330; border-radius: 12px;
      padding: 28px; width: 100%; max-width: 440px; margin: 16px;
    }
    .modal h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: #f1f5f9; }
    .form-row { margin-bottom: 16px; }
    .form-row label {
      display: block; font-size: 0.75rem; color: #94a3b8;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .form-row input {
      width: 100%; background: #0f1117; border: 1px solid #1e2330;
      border-radius: 8px; padding: 10px 12px; color: #e2e8f0;
      font-size: 0.9rem; font-family: inherit;
    }
    .form-row input:focus { outline: none; border-color: #0369a1; }
    .form-error {
      color: #f87171; font-size: 0.8rem; margin-top: 12px; min-height: 1em;
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  </style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:12px">
    <h1>⚡ Pulse</h1>
    <span>DevOps Monitor</span>
  </div>
  <span class="refresh" id="last-refresh">Loading...</span>
</header>

<div class="container">

  <!-- Health Score -->
  <div>
    <div class="section-title">Health Score</div>
    <div class="score-card">
      <div class="score-number" id="score-number">—</div>
      <div>
        <div class="score-label">Overall System Health</div>
        <div class="score-status" id="score-status">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Server Metrics -->
  <div>
    <div class="section-title">Server Metrics</div>
    <div class="grid">
      <div class="card">
        <div class="card-label">CPU Usage</div>
        <div class="card-value" id="cpu">—</div>
        <div class="card-sub">percent</div>
      </div>
      <div class="card">
        <div class="card-label">Memory Usage</div>
        <div class="card-value" id="mem">—</div>
        <div class="card-sub">percent</div>
      </div>
      <div class="card">
        <div class="card-label">Disk Usage</div>
        <div class="card-value" id="disk">—</div>
        <div class="card-sub">percent</div>
      </div>
    </div>
  </div>

  <!-- Uptime -->
  <div>
    <div class="section-header">
      <div class="section-title">Uptime</div>
      <button class="btn btn-primary" id="open-add-modal">+ Add Service</button>
    </div>
    <div class="uptime-grid" id="uptime-grid">
      <div class="loading">Loading services...</div>
    </div>
  </div>

  <!-- DORA Metrics -->
  <div>
    <div class="section-title">DORA Metrics</div>
    <div class="dora-grid">
      <div class="card">
        <div class="card-label">Commits (last 7 days)</div>
        <div class="card-value" id="commits">—</div>
        <div class="card-sub" id="per-day">per day</div>
      </div>
      <div class="card">
        <div class="card-label">Change Failure Rate</div>
        <div class="card-value" id="failure-rate">—</div>
        <div class="card-sub" id="runs-info">pipeline runs</div>
      </div>
    </div>
  </div>

</div>

<!-- Add Service Modal -->
<div class="modal-backdrop" id="add-modal-backdrop">
  <div class="modal">
    <h2>Add Service</h2>
    <div class="form-row">
      <label for="service-name">Name</label>
      <input type="text" id="service-name" placeholder="e.g. Cloudflare" autocomplete="off" />
    </div>
    <div class="form-row">
      <label for="service-url">URL</label>
      <input type="text" id="service-url" placeholder="https://example.com" autocomplete="off" />
    </div>
    <div class="form-error" id="form-error"></div>
    <div class="modal-actions">
      <button class="btn" id="cancel-add">Cancel</button>
      <button class="btn btn-primary" id="submit-add">Save</button>
    </div>
  </div>
</div>

<script>
  const API = '/api';

  async function fetchScore() {
    const res = await fetch(API + '/score');
    const data = await res.json();
    const el = document.getElementById('score-number');
    el.textContent = data.score;
    el.className = 'score-number score-' + data.status;
    document.getElementById('score-status').textContent = data.status.charAt(0).toUpperCase() + data.status.slice(1);
  }

  async function fetchMetrics() {
    const res = await fetch(API + '/metrics');
    const data = await res.json();
    document.getElementById('cpu').textContent = data.cpu.percent + '%';
    document.getElementById('mem').textContent = data.memory.percent + '%';
    document.getElementById('disk').textContent = data.disk.percent + '%';
  }

  async function fetchUptime() {
    const res = await fetch(API + '/uptime');
    const data = await res.json();
    const grid = document.getElementById('uptime-grid');
    grid.innerHTML = '';

    if (data.services.length === 0) {
      grid.innerHTML = '<div class="loading">No services yet — click "Add Service" to get started.</div>';
      return;
    }

    data.services.forEach(s => {
      const row = document.createElement('div');
      row.className = 'uptime-row';
      row.innerHTML =
        '<div class="uptime-row-info">' +
          '<div class="uptime-name"></div>' +
          '<div class="uptime-latency"></div>' +
        '</div>' +
        '<div class="uptime-row-actions">' +
          '<span class="badge"></span>' +
          '<button class="btn btn-danger" title="Delete service">✕</button>' +
        '</div>';

      // Set text content via .textContent to avoid HTML injection
      row.querySelector('.uptime-name').textContent = s.name;
      row.querySelector('.uptime-latency').textContent =
        (s.latency_ms ? s.latency_ms + 'ms' : 'N/A') + ' — ' + s.url;
      const badge = row.querySelector('.badge');
      badge.textContent = s.status;
      badge.classList.add(s.status);

      // Wire up delete (we need the service id, which /uptime doesn't return —
      // we look it up via /services on click)
      row.querySelector('.btn-danger').addEventListener('click', () => deleteService(s.name));

      grid.appendChild(row);
    });
  }

  async function fetchDora() {
    const res = await fetch(API + '/dora');
    const data = await res.json();
    document.getElementById('commits').textContent = data.deployment_frequency.commits_last_7_days;
    document.getElementById('per-day').textContent = data.deployment_frequency.per_day + ' per day';
    document.getElementById('failure-rate').textContent = data.change_failure_rate.failure_rate_percent + '%';
    document.getElementById('runs-info').textContent = data.change_failure_rate.total_runs + ' pipeline runs';
  }

  async function refresh() {
    await Promise.all([fetchScore(), fetchMetrics(), fetchUptime(), fetchDora()]);
    document.getElementById('last-refresh').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
  }

  // --- Modal logic ---

  const modal = document.getElementById('add-modal-backdrop');
  const nameInput = document.getElementById('service-name');
  const urlInput = document.getElementById('service-url');
  const errorEl = document.getElementById('form-error');
  const submitBtn = document.getElementById('submit-add');

  function openModal() {
    nameInput.value = '';
    urlInput.value = '';
    errorEl.textContent = '';
    modal.classList.add('show');
    nameInput.focus();
  }

  function closeModal() {
    modal.classList.remove('show');
  }

  document.getElementById('open-add-modal').addEventListener('click', openModal);
  document.getElementById('cancel-add').addEventListener('click', closeModal);

  // Close modal when clicking outside the modal box
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  // Submit on Enter inside the form fields
  [nameInput, urlInput].forEach(input => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitAdd();
      if (e.key === 'Escape') closeModal();
    });
  });

  document.getElementById('submit-add').addEventListener('click', submitAdd);

  async function submitAdd() {
    const name = nameInput.value.trim();
    const url = urlInput.value.trim();

    if (!name || !url) {
      errorEl.textContent = 'Both name and URL are required.';
      return;
    }

    submitBtn.disabled = true;
    errorEl.textContent = '';

    try {
      const res = await fetch(API + '/services', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, url }),
      });

      if (res.status === 201) {
        closeModal();
        await refresh();
      } else {
        const data = await res.json();
        errorEl.textContent = data.error || 'Something went wrong.';
      }
    } catch (e) {
      errorEl.textContent = 'Network error: ' + e.message;
    } finally {
      submitBtn.disabled = false;
    }
  }

  // --- Delete logic ---

  async function deleteService(name) {
    if (!confirm('Delete service "' + name + '"? This can be undone via the API.')) {
      return;
    }

    // Look up the service id by name
    const listRes = await fetch(API + '/services');
    const listData = await listRes.json();
    const service = listData.services.find(s => s.name === name);

    if (!service) {
      alert('Service not found.');
      await refresh();
      return;
    }

    const res = await fetch(API + '/services/' + service.id, { method: 'DELETE' });
    if (res.ok) {
      await refresh();
    } else {
      alert('Failed to delete service.');
    }
  }

  refresh();
  setInterval(refresh, 30000);
</script>
</body>
</html>
